trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - docs/**

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Validate
    displayName: 'Validate Code Canvas Rules'
    jobs:
      - job: GuardianValidation
        displayName: 'Guardian Rules & Schema'
        steps:
          - task: UseDeno@0
            inputs:
              denoVersion: '2.x'

          - script: deno task prepare-hooks
            displayName: 'Install Git Hooks'

          - script: deno task canvas validate check
            displayName: 'Validate Guardian Rules'

          - script: deno task canvas validate config
            displayName: 'Validate YAML Schemas'

          - script: deno task canvas activity status
            displayName: 'Check FSM State'

      - job: ActivityCheck
        displayName: 'Activity Constraints'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        steps:
          - script: |
              ACTIVITY=$(grep 'activity:' sot/state/activity.yaml | cut -d':' -f2 | tr -d ' ')
              echo "Current activity: $ACTIVITY"
              echo "##vso[task.setvariable variable=CurrentActivity]$ACTIVITY"
            displayName: 'Get Current Activity'

          - script: |
              echo "Activity is: $(CurrentActivity)"
              case $(CurrentActivity) in
                design|implementation|release)
                  echo "✅ Valid activity for PR"
                  ;;
                *)
                  echo "❌ Unknown activity"
                  exit 1
                  ;;
              esac
            displayName: 'Verify Activity'

  - stage: Test
    displayName: 'Run Tests'
    dependsOn: Validate
    jobs:
      - job: UnitTests
        displayName: 'Unit Tests'
        steps:
          - task: UseDeno@0
            inputs:
              denoVersion: '2.x'

          - script: deno task test
            displayName: 'Run Test Suite'

  - stage: Render
    displayName: 'Render Documentation'
    dependsOn: Test
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - job: RenderCanvases
        displayName: 'Render Canvas Files'
        steps:
          - task: UseDeno@0
            inputs:
              denoVersion: '2.x'

          - script: deno task canvas canvas render --all
            displayName: 'Render All Canvases'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'output'
              artifactName: 'rendered-canvases'
              publishLocation: 'Container'
            displayName: 'Publish Canvas Artifacts'
